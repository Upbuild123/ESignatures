<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upbuild E-Sign — Send Coaching Agreement</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <nav><a href="/">Dashboard</a><a href="/send">Send Document</a></nav>
  <h1>Send Coaching Agreement</h1>
  {{FLASH}}
  <form method="POST" action="/send">
    <input type="hidden" name="documentType" value="coaching_agreement">

    <div class="field">
      <label for="clientName">Client Full Name</label>
      <input type="text" id="clientName" name="clientName" required placeholder="Kavi Gupta">
    </div>

    <div class="field">
      <label for="clientEmail">Client Email</label>
      <input type="email" id="clientEmail" name="clientEmail" required placeholder="client@example.com">
    </div>

    <div class="field">
      <label for="feePerSession">Fee Per Session ($)</label>
      <input type="number" id="feePerSession" name="feePerSession" required placeholder="650" min="0">
    </div>

    <div class="field">
      <label for="coachName">Coach Name</label>
      <input type="text" id="coachName" name="coachName" required value="Rasanath Das">
    </div>

    <button type="submit" class="btn">Send for Signature</button>
  </form>
</div>
</body>
</html>
