<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upbuild E-Sign — Send Document</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <nav><a href="/">Dashboard</a><a href="/send">Send Document</a></nav>
  <h1>Send Document for Signature</h1>
  {{FLASH}}
  <form method="POST" action="/send">
    <div class="field">
      <label for="documentType">Document Type</label>
      <select id="documentType" name="documentType" required onchange="showFields(this.value)">
        <option value="">— Select —</option>
        <option value="uct_payment_plan">UCT Payment Plan Agreement</option>
        <option value="coaching_agreement">Coaching Agreement</option>
        <option value="services_agreement">Leadership Coaching Proposal</option>
      </select>
    </div>

    <div class="field">
      <label for="clientName">Client Full Name</label>
      <input type="text" id="clientName" name="clientName" required placeholder="Amanda Paul">
    </div>

    <div class="field">
      <label for="clientEmail">Client Email</label>
      <input type="email" id="clientEmail" name="clientEmail" required placeholder="client@example.com">
    </div>

    <!-- UCT Payment Plan fields -->
    <div id="fields-uct_payment_plan" class="field-group">
      <div class="field"><label for="startMonth">Course Start Month</label><input type="text" id="startMonth" name="startMonth" placeholder="October, 2026"></div>
      <div class="field"><label for="endMonth">End Month</label><input type="text" id="endMonth" name="endMonth" placeholder="March, 2027"></div>
      <div class="field"><label for="upfrontAmount">Upfront Amount</label><input type="text" id="upfrontAmount" name="upfrontAmount" placeholder="$400"></div>
      <div class="field"><label for="monthlyAmount">Monthly Amount</label><input type="text" id="monthlyAmount" name="monthlyAmount" placeholder="$400"></div>
      <div class="field"><label for="totalAmount">Total Amount</label><input type="text" id="totalAmount" name="totalAmount" placeholder="$4800"></div>
    </div>

    <!-- Coaching Agreement fields -->
    <div id="fields-coaching_agreement" class="field-group">
      <div class="field"><label for="feePerSession">Fee Per Session</label><input type="text" id="feePerSession" name="feePerSession" placeholder="$650/session"></div>
      <div class="field"><label for="coachName">Coach Name</label><input type="text" id="coachName" name="coachName" placeholder="Rasanath Das"></div>
    </div>

    <!-- Services Agreement fields -->
    <div id="fields-services_agreement" class="field-group">
      <div class="field"><label for="companyName">Company Name</label><input type="text" id="companyName" name="companyName" placeholder="Cast &amp; Crew"></div>
      <div class="field"><label for="date">Proposal Date</label><input type="text" id="date" name="date" placeholder="January 9, 2026"></div>
      <div class="field"><label for="coachNameSA">Coach Name</label><input type="text" id="coachNameSA" name="coachNameSA" placeholder="Vipin"></div>
      <div class="field"><label for="hourlyRate">Hourly Rate</label><input type="text" id="hourlyRate" name="hourlyRate" placeholder="$1,200"></div>
      <div class="field"><label for="dayRate">Day Rate</label><input type="text" id="dayRate" name="dayRate" placeholder="$10,000"></div>
      <div class="field"><label for="kickoffFee">Kickoff Fee</label><input type="text" id="kickoffFee" name="kickoffFee" placeholder="$5,000"></div>
      <div class="field"><label for="executiveMonthlyRate">Executive Monthly Rate</label><input type="text" id="executiveMonthlyRate" name="executiveMonthlyRate" placeholder="$1,200/month"></div>
      <div class="field"><label for="executiveTotal">Executive Total</label><input type="text" id="executiveTotal" name="executiveTotal" placeholder="$67,200"></div>
      <div class="field"><label for="ceoTotal">CEO Total</label><input type="text" id="ceoTotal" name="ceoTotal" placeholder="$24,000"></div>
      <div class="field"><label for="cohortSessionRate">Cohort Session Rate</label><input type="text" id="cohortSessionRate" name="cohortSessionRate" placeholder="$3,000/session"></div>
      <div class="field"><label for="cohortTotal">Cohort Total</label><input type="text" id="cohortTotal" name="cohortTotal" placeholder="$24,000"></div>
      <div class="field"><label for="grandTotal">Grand Total</label><input type="text" id="grandTotal" name="grandTotal" placeholder="$150,000"></div>
    </div>

    <button type="submit" class="btn">Send for Signature</button>
  </form>
</div>
<script>
function showFields(type) {
  document.querySelectorAll('.field-group').forEach(el => el.classList.remove('active'));
  if (type) {
    const group = document.getElementById('fields-' + type);
    if (group) group.classList.add('active');
  }
}
// Show fields for pre-selected type on page load (e.g. after validation error)
const sel = document.getElementById('documentType');
if (sel.value) showFields(sel.value);
</script>
</body>
</html>
